name: Deploy ARC

on:
  push:
    branches: [main]
    paths:
      - "arc-system/**"
      - "versions.env"
      - "install.sh"
      - ".github/workflows/deploy-arc.yaml"
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        default: deploy
        type: choice
        options:
          - deploy
          - destroy

permissions:
  contents: read
  id-token: write      # required for OIDC token exchange with AWS

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Helm deploy ARC
    if: github.event_name == 'push' || inputs.action == 'deploy'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Load pinned versions
        run: |
          set -a && source versions.env && set +a
          echo "ARC_CHART_VERSION=${ARC_CHART_VERSION}" >> "$GITHUB_ENV"

      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.32.0"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.17.0"

      - name: Authenticate to AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Apply RBAC
        run: kubectl apply -f arc-system/rbac.yaml

      - name: Apply NetworkPolicies
        run: kubectl apply -f arc-system/network-policy.yaml

      - name: Deploy ARC controller
        run: |
          helm upgrade --install arc \
            oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller \
            --version "$ARC_CHART_VERSION" \
            --namespace arc-system \
            --create-namespace \
            --values arc-system/arc-controller-values.yaml \
            --wait --timeout 5m

      - name: Deploy runner scale set
        run: |
          helm upgrade --install arc-runner-set \
            oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set \
            --version "$ARC_CHART_VERSION" \
            --namespace arc-runners \
            --create-namespace \
            --values arc-system/arc-runner-scale-set-values.yaml \
            --wait --timeout 5m

      # - name: Apply ServiceMonitors  # Requires Prometheus Operator — enable later
      #   run: kubectl apply -f arc-system/service-monitor.yaml

      - name: Verify rollout
        run: |
          DEPLOY=$(kubectl get deploy -n arc-system -l app.kubernetes.io/instance=arc -o jsonpath='{.items[0].metadata.name}')
          echo "Controller deployment: $DEPLOY"
          kubectl rollout status deployment/"$DEPLOY" -n arc-system --timeout=120s
          kubectl get autoscalingrunnerset -n arc-runners

  destroy:
    name: Destroy ARC
    if: inputs.action == 'destroy'
    runs-on: ubuntu-latest

    steps:
      - name: Configure kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.32.0"

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "v3.17.0"

      - name: Authenticate to AWS via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure kubectl for EKS
        run: |
          aws eks update-kubeconfig \
            --region ${{ secrets.AWS_REGION }} \
            --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Uninstall runner scale set
        run: helm uninstall arc-runner-set -n arc-runners --wait --timeout 5m || true

      - name: Uninstall ARC controller
        run: helm uninstall arc -n arc-system --wait --timeout 5m || true

      - name: Delete namespaces
        run: |
          kubectl delete ns arc-runners --ignore-not-found --timeout=60s || true
          kubectl delete ns arc-system --ignore-not-found --timeout=60s || true

      - name: Verify cleanup
        run: |
          echo "Remaining Helm releases:"
          helm list -A
          echo "Remaining namespaces:"
          kubectl get ns
