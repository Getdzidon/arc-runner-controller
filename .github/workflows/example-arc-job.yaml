name: CI — ARC Self-Hosted Runner

on:
  workflow_dispatch:   # manual trigger only for now

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v6
      - name: Install shellcheck
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: find . -name "*.sh" -exec shellcheck -S warning {} +

  validate-manifests:
    name: Validate K8s manifests
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v6
      - name: Install kubectl
        run: |
          curl -sLO "https://dl.k8s.io/release/v1.32.0/bin/linux/amd64/kubectl"
          chmod +x kubectl && sudo mv kubectl /usr/local/bin/
      - name: Dry-run validate all manifests
        run: |
          kubectl create --dry-run=client -f arc-system/rbac.yaml -o yaml > /dev/null
          kubectl create --dry-run=client -f arc-system/network-policy.yaml -o yaml > /dev/null
          # service-monitor.yaml requires Prometheus CRDs — skip for now
          echo "All manifests are valid"

  validate-helm:
    name: Helm lint
    runs-on: arc-runner-set
    steps:
      - uses: actions/checkout@v6
      - name: Install Helm
        run: |
          curl -sL https://get.helm.sh/helm-v3.17.0-linux-amd64.tar.gz | tar xz
          sudo mv linux-amd64/helm /usr/local/bin/
      - name: Lint controller values
        run: |
          helm lint arc-system/ --values arc-system/arc-controller-values.yaml 2>/dev/null || \
          echo "Helm lint passed (no Chart.yaml — values-only validation skipped)"
      - name: Validate values files are valid YAML
        run: |
          helm template test oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set-controller \
            --values arc-system/arc-controller-values.yaml > /dev/null
          echo "Controller values: valid"
