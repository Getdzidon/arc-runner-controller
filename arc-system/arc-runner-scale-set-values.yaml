# Helm values for the runner scale set
# Chart: oci://ghcr.io/actions/actions-runner-controller-charts/gha-runner-scale-set

## GitHub target — getdzidon's account
githubConfigUrl: "https://github.com/Getdzidon/arc-runner-controller"

## Reference the GitHub App secret created by install.sh
githubConfigSecret: arc-github-app-secret

## Runner scale set name — used in `runs-on:` in your workflows
runnerScaleSetName: "arc-runner-set"

## Autoscaling boundaries
minRunners: 1
maxRunners: 10

## Runner pod template
template:
  spec:
    # Use the least-privilege ServiceAccount defined in rbac.yaml
    serviceAccountName: arc-runner-sa
    containers:
      - name: runner
        image: ghcr.io/actions/actions-runner:latest
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 2Gi
        env:
          - name: ACTIONS_RUNNER_REQUIRE_JOB_CONTAINER
            value: "false"

## Use Kubernetes jobs (ephemeral runners — one job per pod)
containerMode:
  type: "kubernetes"
  kubernetesModeWorkVolumeClaim:
    accessModes: ["ReadWriteOnce"]
    # storageClassName per cloud provider:
    #   GKE      → standard
    #   EKS      → gp2  (or gp3 with a custom StorageClass)
    #   AKS      → default
    #   kind/local → standard
    storageClassName: "gp2"
    resources:
      requests:
        storage: 1Gi
