---
# Deny all ingress to runner pods by default
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: arc-runners-deny-ingress
  namespace: arc-runners
spec:
  podSelector: {}
  policyTypes:
    - Ingress

---
# Allow runners to reach kube-dns (port 53) for name resolution
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: arc-runners-allow-dns
  namespace: arc-runners
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP

---
# Allow runners to reach the internet (GitHub API, registries, etc.)
# Restrict to HTTPS only — runners have no reason to make plain HTTP calls
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: arc-runners-allow-egress-https
  namespace: arc-runners
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/part-of: arc-runner-set
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 443
          protocol: TCP

---
# Allow the ARC controller (arc-system) to communicate with runners
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: arc-runners-allow-controller
  namespace: arc-runners
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: arc-system
